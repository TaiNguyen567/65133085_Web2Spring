<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="dynamic_layout(content)">
<head>
    <meta charset="UTF-8">
    <title>Thi Thử Lập Trình Web 2</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; display: flex; justify-content: center; }
        .wrapper { border: 1px solid #000; width: 100%; max-width: 900px; }
        header { display: flex; justify-content: space-between; border-bottom: 1px solid #000; padding: 15px; }
        .logo { font-size: 14px; color: #b71c1c; font-weight: bold; }
        .main-area { display: flex; min-height: 400px; }
        aside { width: 220px; border-right: 1px solid #000; }
        aside ul { list-style: none; padding: 0; margin: 0; }
        aside li { border-bottom: 1px solid #000; padding: 10px 15px; }
        aside li a { text-decoration: none; color: #000; display: block; }
        aside li a:hover { font-weight: bold; color: blue; }
        main { flex: 1; padding: 20px; }
        footer { border-top: 1px solid #000; text-align: center; padding: 10px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="wrapper">
        <header>
            <div class="logo">
                TRƯỜNG ĐẠI HỌC NHA TRANG<br>
                KHOA CÔNG NGHỆ THÔNG TIN
            </div>
            <div class="user-info">[UserName]</div>
        </header>

        <div class="main-area">
            <aside>
                <ul>
                    <li><strong><a th:href="@{/dashboard}">Dashboard</a></strong></li>
                    <li><a th:href="@{/page/all}">Page - List</a></li>
                    <li><a th:href="@{/page/new}">Page - Addnew</a></li>
                    <li><a th:href="@{/post/all}">Post - List</a></li>
                    <li><a th:href="@{/post/new}">Post - Addnew</a></li>
                </ul>
            </aside>
            
            <main th:replace="${content}">
                </main>
        </div>

        <footer>
            &copy; 2025 by Nguyen Thanh Tai – FIT.NTU
        </footer>
    </div>
</body>
</html>
