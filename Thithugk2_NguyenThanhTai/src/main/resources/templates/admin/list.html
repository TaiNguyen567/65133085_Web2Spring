<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Sản Phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-primary fw-bold">Danh sách Sản Phẩm</h2>
            <a th:href="@{/admin/sanpham/add}" class="btn btn-success fw-bold">+ Thêm mới</a>
        </div>
        
        <div class="card shadow">
            <div class="card-body p-0">
                <table class="table table-hover table-bordered mb-0">
                    <thead class="table-dark text-center">
                        <tr>
                            <th>ID</th>
                            <th>Tên Sản Phẩm</th>
                            <th>Giá (VNĐ)</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="sp : ${listSP}" class="align-middle">
                            <td class="text-center fw-bold" th:text="${sp.id}"></td>
                            <td th:text="${sp.tenSP}"></td>
                            <td class="text-end text-danger fw-bold" th:text="${sp.gia}"></td>
                            <td class="text-center">
                                <a th:href="@{'/admin/sanpham/delete/' + ${sp.id}}" 
                                   class="btn btn-sm btn-danger"
                                   onclick="return confirm('Bạn có chắc chắn muốn xóa sản phẩm này không?');">
                                    Xóa
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
