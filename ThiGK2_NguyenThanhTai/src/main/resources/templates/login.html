<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng Nhập Hệ Thống</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); }
        .login-wrapper { background: #ffffff; padding: 40px 50px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); width: 100%; max-width: 380px; position: relative; overflow: hidden; }
        .login-wrapper::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 6px; background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%); }
        h2 { text-align: center; color: #1e293b; font-size: 28px; font-weight: 700; margin-top: 0; margin-bottom: 30px; letter-spacing: -0.5px; }
        .error-msg { background: #fee2e2; color: #ef4444; padding: 12px; border-radius: 8px; text-align: center; font-size: 14px; margin-bottom: 20px; font-weight: 500; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #475569; font-size: 14px; font-weight: 600; }
        input[type="text"], input[type="password"] { width: 100%; padding: 14px 16px; border: 1px solid #e2e8f0; border-radius: 10px; background-color: #f8fafc; font-size: 15px; transition: all 0.3s; box-sizing: border-box; }
        input[type="text"]:focus, input[type="password"]:focus { outline: none; border-color: #4facfe; background-color: #ffffff; box-shadow: 0 0 0 4px rgba(79, 172, 254, 0.15); }
        button { width: 100%; padding: 14px; background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); border: none; border-radius: 10px; color: white; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; margin-top: 10px; }
        button:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0, 242, 254, 0.3); }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <h2>Welcome Back</h2>
        <div th:if="${error}" class="error-msg" th:text="${error}"></div>
        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label>Tài khoản Admin</label>
                <input type="text" name="username" required placeholder="Nhập tên đăng nhập..." />
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" name="password" required placeholder="••••••••" />
            </div>
            <button type="submit">Đăng Nhập Ngay</button>
        </form>
    </div>
</body>
</html>
